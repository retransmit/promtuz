[network]
address = "0.0.0.0:4432"
cert_path = "cert/relay.crt"
# TLS server key (used by rustls during the handshake)
key_path = "cert/relay.key"
# Long-term Ed25519 identity key (used to sign RelayHello, derives relay_id).
# Auto-generated with 0o600 perms on first boot if missing.
identity_key_path = "cert/relay.identity.key"
root_ca_path = "cert/root_ca.pem"

[[resolver.seed]]
# Resolver's Identity Public Key
key = "A038F54EC3EBC391F423236E0091413C7275EFEDC65E89D3BFF9DF055FEFE4CC"
addr = "192.168.100.2:4433"

# DHT configuration (see misc/specs/DHT.md §0 for full constants table).
# All protocol parameters are hard-coded in `relay/src/dht/config.rs` so
# every relay in the network agrees on them. Only the knobs below are
# operator-tunable. Phase 1 default is `enabled = false`; flip to `true`
# only inside test deployments until Phase 3 cutover (§11.8).
#
# [dht]
# enabled = false
#
# # Optional: override of k-bucket size for testing. Production should
# # leave this unset (canonical value is 16; see §0).
# bucket_size = 16
